<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>外來入侵種動物防治通報網 - 點收者模式</title>
    <style>
        :root { --primary: #3b82f6; --bg: #f8fafc; --sidebar-bg: #0f172a; font-size: 125%; }
        * { box-sizing: border-box; } 
        body { font-family: 'Microsoft JhengHei', sans-serif; margin: 0; height: 100vh; overflow: hidden; background: var(--bg); }
        
        /* 根容器區隔 */
        .interface-container { width: 100%; height: 100%; display: none; }
        .interface-container.active { display: flex; }

        /* ====== 歡迎頁 & 身分選擇頁 ====== */
        #intro-interface { flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .page { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; animation: fadeIn 0.4s; text-align: center; }
        .page.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .welcome-title { font-size: 2.5rem; color: #1e293b; margin-bottom: 5px; font-weight: bold; }
        .welcome-subtitle { font-size: 2rem; color: #475569; margin-top: 0; margin-bottom: 40px; }
        
        /* 首頁兩顆按鈕的排版 */
        .welcome-actions { display: flex; flex-direction: row; gap: 20px; justify-content: center; width: 100%; max-width: 500px; margin: 0 auto; }
        .welcome-actions .btn { flex: 1; padding: 15px 0; white-space: nowrap; }

        .role-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 500px; padding: 20px; }
        /* 網頁版：確保奇數的最後一個置中且與其他同寬 */
        .role-grid:not(.role-grid--no-last-span) > div:last-child { grid-column: 1 / -1; justify-self: center; width: calc(50% - 7.5px); }
        
        .role-card { padding: 20px; border-radius: 12px; cursor: pointer; color: white; transition: 0.3s; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); font-size: 1.1rem; font-weight: bold; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .role-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px rgba(0,0,0,0.2); filter: brightness(1.1); }
        .role-card small { display: block; margin-top: 5px; opacity: 0.9; font-size: 0.85rem; font-weight: normal; }
        
        .btn { padding: 15px 40px; border-radius: 30px; border: none; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; text-align: center; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(59,130,246,0.3); }
        .btn-primary:hover { background: #2563eb; transform: translateY(-2px); }
        .btn-outline { background: white; border: 2px solid var(--primary); color: var(--primary); }
        .btn-outline:hover { background: #eff6ff; }

        .back-nav { position: absolute; top: 25px; left: 30px; z-index: 100; cursor: pointer; display: flex; align-items: center; color: #475569; font-weight: bold; font-size: 1.1rem; transition: 0.2s; padding: 10px; border-radius: 8px; }
        .back-nav:hover { background: #e2e8f0; }

        /* ====== 主手冊介面 ====== */
        #manual-interface { flex-direction: row; }
        #sidebar { width: 280px; background: var(--sidebar-bg); color: white; padding: 20px 10px; overflow-y: auto; flex-shrink: 0; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 10; }
        #main-content { flex: 1; display: flex; flex-direction: column; padding: 40px; align-items: center; overflow-y: auto; position: relative; }
        
        .acc-btn { background: #1e293b; color: #e2e8f0; cursor: pointer; padding: 14px; width: 100%; border: none; text-align: left; border-radius: 6px; margin-bottom: 5px; font-weight: bold; font-size: 1.05rem; }
        .acc-btn:hover { background: #3b82f6; }
        .group-btn { display: block; width: 100%; padding: 12px 25px; background: transparent; color: #94a3b8; border: none; text-align: left; cursor: pointer; font-size: 0.95rem; transition: 0.2s; }
        .group-btn:hover, .group-btn.active { color: #60a5fa; background: rgba(255,255,255,0.05); }
        
        #tab-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 940px; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; }
        .tab-item { padding: 8px 20px; cursor: pointer; border-radius: 20px; background: #e2e8f0; color: #475569; font-weight: bold; transition: 0.2s; }
        .tab-item.active { background: var(--primary); color: white; }

        #text-box { background: white; padding: 30px; border-radius: 12px; width: 100%; max-width: 940px; border-left: 6px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
        #v-title { margin-top: 0; font-size: 1.5rem; color: #1e293b; margin-bottom: 10px; }
        #v-desc { margin: 0; font-size: 1.1rem; color: #475569; line-height: 1.6; }

        /* ====== 🖼️ 展示框架與內容 (完美貼合修正) ====== */
        #media-container { width: 100%; display: flex; justify-content: center; margin-bottom: 50px; }
        
        #media-wrapper {
            display: inline-flex; 
            max-width: 100%; 
            background: white; 
            padding: 5px; 
            border: 2px solid #cbd5e1; 
            border-radius: 12px; 
            box-shadow: 0 25px 35px -5px rgba(0,0,0,0.15), 0 15px 15px -5px rgba(0,0,0,0.1), inset 0 2px 3px rgba(255,255,255,0.8);
        }

        .media-content { 
            width: auto;     
            height: auto;
            max-width: 100%; 
            max-height: 55vh; 
            border-radius: 8px;
            clip-path: inset(2px round 8px); 
            display: none; 
        }

        /* ====== 📱 響應式設計 (手機/平板 RWD) ====== */
        @media (max-width: 768px) {
            .welcome-title { font-size: 2rem; }
            .welcome-subtitle { font-size: 1.4rem; margin-bottom: 25px; }
            .btn { padding: 12px 25px; font-size: 1rem; margin-bottom: 10px; }

            /* 手機版首頁按鈕排版：改為上下堆疊且等寬 */
            .welcome-actions { flex-direction: column; width: 100%; max-width: 350px; padding: 0 20px; margin: 0 auto; }
            .welcome-actions .btn { width: 100%; margin-bottom: 15px; }
            
            /* 身分卡片變單列 */
            .role-grid { grid-template-columns: 1fr; padding: 10px; }
            .role-grid > div:last-child { width: 100% !important; justify-self: stretch !important; }
            
            /* 快速導覽資訊改為「兩兩一排」 */
            #quick-guide-list {
                display: grid !important; 
                grid-template-columns: repeat(2, 1fr); 
                gap: 10px;
                padding: 0 10px;
                height: auto !important; 
                margin-bottom: 15px !important; /* 縮小與下方按鈕的間距 */
            }
            #quick-guide-list .btn {
                width: 100%;
                height: 100%;
                min-height: 60px; 
                white-space: normal; 
                padding: 10px;
                font-size: 0.95rem !important;
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 0;
            }

            /* 💡 修正 1：對齊「查看所有操作手冊」的寬度與高度 */
            #full-manual-btn {
                width: calc(100% - 20px) !important; /* 扣除左右各 10px 的間距以對齊上方 Grid */
                margin: 0 10px !important;           /* 左右保留 10px 邊距 */
                min-height: 60px;                    /* 與上方按鈕同高 */
                padding: 10px;
                font-size: 0.95rem !important;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            /* 💡 修正 2：確保右下角目錄選單在不需要時徹底隱藏 */
            /* 不要直接用 #manual-interface { display: block; }，這會覆蓋隱藏屬性 */
            .interface-container.active#manual-interface { display: block; } 
            
            #sidebar { 
                position: fixed; 
                top: 0; 
                left: -100%; 
                width: 80%; 
                max-width: 300px; 
                height: 100vh; 
                max-height: 100vh; 
                z-index: 9999; 
                transition: left 0.3s ease; 
                overflow-y: auto; 
                padding-bottom: 80px; 
                border-right: 2px solid #0f172a;
            }
            #sidebar.active { left: 0; }
            #main-content { padding: 20px 15px; }
            
            /* 手機版遮罩層與漢堡按鈕設定 */
            .sidebar-overlay {
                display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.6); z-index: 9998;
            }
            .sidebar-overlay.active { display: block; }
            
            .mobile-menu-btn {
                display: flex !important; align-items: center; justify-content: center;
                position: fixed; bottom: 20px; right: 20px;
                background: #3b82f6; color: white; border: none; border-radius: 50%;
                width: 60px; height: 60px; font-size: 1.8rem;
                z-index: 9997; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer;
            }
            
            /* 文字框與內容縮放 */
            #text-box { padding: 20px; }
            #v-title { font-size: 1.3rem; }
            #v-desc { font-size: 1rem; }
            .media-content { max-height: 40vh; }
            
            /* 返回鍵優化 */
            .back-nav { top: 15px; left: 15px; background: rgba(255,255,255,0.8); backdrop-filter: blur(5px); }
        }
    </style>
</head>
<body>

    <div id="intro-interface" class="interface-container active">
        <div id="page-welcome" class="page active">
            <div class="welcome-title">歡迎使用</div>
            <div class="welcome-subtitle">外來入侵種動物防治通報網 - 點收者模式</div>
            <div class="welcome-actions">
                <button class="btn btn-outline" onclick="window.open('https://fonghs.emct.tw/tis/login')">進入 TIS 網站</button>
                <button class="btn btn-primary" onclick="showIntroPage('page-roles')">操作手冊</button>
            </div>
        </div>

        <div id="page-roles" class="page">
            <div class="back-nav" onclick="showIntroPage('page-welcome')">⬅ 回首頁</div>
            <h2 style="font-size: 1.8rem; margin-bottom: 20px; color: #1e293b;">請選擇您的身分</h2>
            <div class="role-grid role-grid--no-last-span">
                <div class="role-card" style="background:#3b82f6" onclick="selectRole('點收者')"><span style="font-size:1.1rem">點收者</span><small>[點收廠商]</small></div>
                <div class="role-card" style="background:#8b5cf6" onclick="selectRole('使用者')"><span style="font-size:1.1rem">使用者</span><small>[獵人]</small></div>
            </div>
        </div>
        <div id="page-guide" class="page">
            <div class="back-nav" onclick="showIntroPage('page-roles')">⬅ 重新選擇身分</div>
            <h2 id="role-title" style="font-size: 1.8rem; margin-bottom: 30px; color: #1e293b;"></h2>
            <div id="quick-guide-list" style="display:flex; flex-wrap:wrap; justify-content:center; gap:15px; max-width:800px; margin-bottom:50px;"></div>
            <button id="full-manual-btn" class="btn btn-primary" onclick="enterFullManual()">查看所有操作手冊</button>
        </div>
    </div>

    <div id="manual-interface" class="interface-container">
        <button id="mobile-menu-btn" class="mobile-menu-btn" style="display:none;" onclick="toggleMobileSidebar()">☰</button>
        <div id="mobile-overlay" class="sidebar-overlay" onclick="toggleMobileSidebar()"></div>
        
        <div id="sidebar">
            <div style="padding: 0 10px 15px 10px; margin-bottom: 15px; border-bottom: 1px solid #334155;">
                <div style="cursor: pointer; color: #94a3b8; font-weight: bold; margin-bottom: 10px; transition: 0.2s;" onclick="exitManual()" onmouseover="this.style.color='white'" onmouseout="this.style.color='#94a3b8'">⬅ 返回身分引導</div>
                <h2 style="margin: 0; font-size: 1.3rem;">📚 操作目錄</h2>
            </div>
            <div id="sidebar-content"></div>
        </div>
        
        <div id="main-content">
            <div id="tab-container"></div>
            <div id="text-box">
                <h3 id="v-title"></h3>
                <p id="v-desc"></p>
            </div>
            
            <div id="media-container">
                <div id="media-wrapper">
                    <img id="display-img" class="media-content" src="" alt="教學截圖">
                    <video id="display-video" class="media-content" src="" autoplay loop muted playsinline></video>
                </div>
            </div>
        </div>
    </div>

        const quickGuideData = {"超級管理者": [{"id": "Capture_監測圖台_時間篩選.mp4", "label": "看特定資料"}, {"id": "Capture_監測圖台_CSV下載.mp4", "label": "下載核對資料"}, {"id": "Capture_監測圖台_圖層套疊.mp4", "label": "看地景分布"}, {"id": "Capture_統計圖表_性別組成變化.mp4", "label": "看月匯報"}, {"id": "Capture_調查資料_編輯資料.mp4", "label": "修正資料"}, {"id": "Capture_調查資料_CSV下載.mp4", "label": "需要匯報-CSV"}, {"id": "Capture_調查資料_照片下載.mp4", "label": "需要匯報-照片"}, {"id": "Capture_帳號管理_新增帳號(單筆).mp4", "label": "新增帳號"}, {"id": "Capture_物種管理_新增物種.mp4", "label": "紀錄更多入侵動物"}], "管理者": [{"id": "Capture_監測圖台_時間篩選.mp4", "label": "看特定資料"}, {"id": "Capture_監測圖台_CSV下載.mp4", "label": "下載核對資料"}, {"id": "Capture_監測圖台_圖層套疊.mp4", "label": "看地景分布"}, {"id": "Capture_統計圖表_性別組成變化.mp4", "label": "看月匯報"}, {"id": "Capture_調查資料_編輯資料.mp4", "label": "修正資料"}, {"id": "Capture_調查資料_點收.mp4", "label": "點收資料"}, {"id": "Capture_調查資料_CSV下載.mp4", "label": "需要匯報-CSV"}, {"id": "Capture_調查資料_照片下載.mp4", "label": "需要匯報-照片"}, {"id": "Capture_帳號管理_新增帳號(單筆).mp4", "label": "新增帳號"}], "資料審核者": [{"id": "Capture_監測圖台_時間篩選.mp4", "label": "看特定資料"}, {"id": "Capture_監測圖台_CSV下載.mp4", "label": "下載核對資料"}, {"id": "Capture_監測圖台_圖層套疊.mp4", "label": "看地景分布"}, {"id": "Capture_統計圖表_性別組成變化.mp4", "label": "看月匯報"}, {"id": "Capture_調查資料_審核.mp4", "label": "審核資料"}, {"id": "Capture_調查資料_CSV下載.mp4", "label": "需要匯報-CSV"}, {"id": "Capture_調查資料_照片下載.mp4", "label": "需要匯報-照片"}], "點收者": [{"id": "Capture_監測圖台_時間篩選.mp4", "label": "看特定資料"}, {"id": "Capture_監測圖台_CSV下載.mp4", "label": "下載核對資料"}, {"id": "Capture_監測圖台_圖層套疊.mp4", "label": "看地景分布"}, {"id": "Capture_統計圖表_性別組成變化.mp4", "label": "看月匯報"}, {"id": "Capture_調查資料_點收.mp4", "label": "點收資料"}, {"id": "Capture_調查資料_CSV下載.mp4", "label": "需要匯報-CSV"}, {"id": "Capture_調查資料_照片下載.mp4", "label": "需要匯報-照片"}], "使用者": [{"id": "Capture_監測圖台_時間篩選.mp4", "label": "看特定資料"}, {"id": "Capture_監測圖台_CSV下載.mp4", "label": "下載核對資料"}, {"id": "Capture_監測圖台_圖層套疊.mp4", "label": "看地景分布"}, {"id": "B.png", "label": "App 教學"}]};
        let currentRole = "";

        function showIntroPage(pageId) {
            document.querySelectorAll('#intro-interface .page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function selectRole(role) {
            currentRole = role;
            document.getElementById('role-title').innerText = `您好，我是 ${role}`;
            const list = document.getElementById('quick-guide-list');
            list.innerHTML = '';
            
            const guides = quickGuideData[role] || [];
            guides.forEach(g => {
                const b = document.createElement('button');
                b.className = 'btn btn-outline';
                b.style.fontSize = '1rem';
                b.style.padding = '10px 20px';
                b.innerText = g.label;
                b.onclick = () => jumpToManual(g.id);
                list.appendChild(b);
            });
            showIntroPage('page-guide');
        }

        function enterFullManual() {
            document.getElementById('intro-interface').classList.remove('active');
            document.getElementById('manual-interface').classList.add('active');
            renderSidebar(); 
            const firstGroup = document.querySelector('.group-btn');
            if(firstGroup) firstGroup.click();
        }

        function toggleMobileSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        function exitManual() {
            document.getElementById('manual-interface').classList.remove('active');
            document.getElementById('intro-interface').classList.add('active');
            showIntroPage('page-guide');
        }

        function jumpToManual(id) {
            document.getElementById('intro-interface').classList.remove('active');
            document.getElementById('manual-interface').classList.add('active');
            renderSidebar(); 
            
            for (const cat of Object.keys(nestedData)) {
                for (const group of Object.keys(nestedData[cat])) {
                    const found = nestedData[cat][group].find(i => i.id === id);
                    if (found) {
                        const gBtns = document.querySelectorAll('.group-btn');
                        gBtns.forEach(b => { if(b.innerText === group) b.click(); });
                        setTimeout(() => {
                            const tabs = document.querySelectorAll('.tab-item');
                            tabs.forEach(t => { if(t.getAttribute('data-id') === id) t.click(); });
                        }, 50);
                        return;
                    }
                }
            }
        }

        function renderSidebar() {
            const sidebarContent = document.getElementById('sidebar-content');
            sidebarContent.innerHTML = ''; 
            
            for (const [cat, groups] of Object.entries(nestedData)) {
                let catHasItems = false;
                const acc = document.createElement('button');
                acc.className = 'acc-btn';
                acc.innerHTML = cat + " ▾";
                
                const panel = document.createElement('div');
                panel.style.display = 'none';
                
                acc.onclick = () => panel.style.display = (panel.style.display==='none'?'block':'none');

                for (const [gName, items] of Object.entries(groups)) {
                    const validItems = items.filter(item => item.roles.includes(currentRole));
                    if (validItems.length > 0) {
                        catHasItems = true;
                        const gb = document.createElement('button');
                        gb.className = 'group-btn';
                        gb.innerText = gName;
                        gb.onclick = () => {
                            panel.style.display = 'block'; 
                            renderTabs(validItems, gb);
                        };
                        panel.appendChild(gb);
                    }
                }
                
                if (catHasItems) {
                    sidebarContent.appendChild(acc);
                    sidebarContent.appendChild(panel);
                }
            }
        }

        function renderTabs(items, btn) {
            document.querySelectorAll('.group-btn').forEach(b => { b.style.color = '#94a3b8'; b.classList.remove('active'); });
            btn.style.color = '#60a5fa';
            btn.classList.add('active');
            
            const container = document.getElementById('tab-container');
            container.innerHTML = '';
            container.style.display = items.length > 1 ? 'flex' : 'none';

            items.forEach(item => {
                const t = document.createElement('div');
                t.className = 'tab-item';
                t.innerText = item.tabName;
                t.setAttribute('data-id', item.id);
                t.onclick = () => {
                    document.querySelectorAll('.tab-item').forEach(x => x.classList.remove('active'));
                    t.classList.add('active');
                    document.getElementById('v-title').innerText = item.tabName;
                    document.getElementById('v-desc').innerText = item.desc;
                    updateMedia("../" + item.img);
                    
                    if(window.innerWidth <= 768 && document.getElementById('sidebar').classList.contains('active')) {
                        toggleMobileSidebar();
                    }
                };
                container.appendChild(t);
            });
            if(items.length > 0) container.firstChild.click();
        }

        function updateMedia(file) {
            const img = document.getElementById('display-img');
            const video = document.getElementById('display-video');
            
            img.style.display = 'none';
            video.style.display = 'none';
            video.pause();

            if (file.toLowerCase().endsWith('.mp4') || file.toLowerCase().endsWith('.webm')) {
                video.src = file;
                video.style.display = 'block'; 
                video.play();
            } else {
                img.src = file;
                img.style.display = 'block'; 
            }
        }
    </script>
